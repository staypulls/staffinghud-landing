<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#060a08"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(0,229,122,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="80%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(0,229,122,0.07)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Corner accents -->
  <line x1="0" y1="0" x2="120" y2="0" stroke="rgba(0,229,122,0.6)" stroke-width="2"/>
  <line x1="0" y1="0" x2="0" y2="120" stroke="rgba(0,229,122,0.6)" stroke-width="2"/>
  <line x1="1200" y1="630" x2="1080" y2="630" stroke="rgba(0,229,122,0.3)" stroke-width="2"/>
  <line x1="1200" y1="630" x2="1200" y2="510" stroke="rgba(0,229,122,0.3)" stroke-width="2"/>

  <!-- HUD mark -->
  <g transform="translate(80, 220)">
    <circle cx="32" cy="32" r="28" stroke="#00e57a" stroke-width="2" fill="none" opacity="0.7"/>
    <circle cx="32" cy="32" r="17" stroke="#00e57a" stroke-width="1" fill="none" opacity="0.35"/>
    <circle cx="32" cy="32" r="5" fill="#00e57a"/>
    <line x1="32" y1="2" x2="32" y2="12" stroke="#00e57a" stroke-width="2"/>
    <line x1="32" y1="52" x2="32" y2="62" stroke="#00e57a" stroke-width="2"/>
    <line x1="2" y1="32" x2="12" y2="32" stroke="#00e57a" stroke-width="2"/>
    <line x1="52" y1="32" x2="62" y2="32" stroke="#00e57a" stroke-width="2"/>
  </g>

  <!-- Main wordmark -->
  <text x="80" y="310" font-family="'Arial Black', Arial, sans-serif" font-size="96" font-weight="900" fill="#eef4f0" letter-spacing="-2">STAFFING</text>
  <text x="80" y="410" font-family="'Arial Black', Arial, sans-serif" font-size="96" font-weight="900" fill="#00e57a" letter-spacing="-2">HUD</text>

  <!-- Tagline -->
  <text x="80" y="455" font-family="'Courier New', monospace" font-size="16" fill="#3a5a42" letter-spacing="4">RECRUITMENT OPERATIONS COMMAND PLATFORM</text>

  <!-- Right side - feature chips -->
  <g transform="translate(720, 160)">
    <!-- Feature list -->
    <rect x="0" y="0" width="400" height="310" fill="rgba(12,17,9,0.8)" stroke="#223320" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="400" height="36" fill="rgba(0,229,122,0.04)"/>
    <text x="14" y="23" font-family="'Courier New', monospace" font-size="10" fill="#00e57a" letter-spacing="3">PLATFORM MODULES</text>

    <!-- Features -->
    <g font-family="'Courier New', monospace" font-size="13" fill="#c8dfd0">
      <text x="14" y="65">&#9672;  Placement Engine</text>
      <line x1="0" y1="74" x2="400" y2="74" stroke="#1a2716" stroke-width="1"/>
      <text x="14" y="100">&#9632;  Job Order Queue</text>
      <line x1="0" y1="109" x2="400" y2="109" stroke="#1a2716" stroke-width="1"/>
      <text x="14" y="135">&#9647;  Candidate Vault</text>
      <line x1="0" y1="144" x2="400" y2="144" stroke="#1a2716" stroke-width="1"/>
      <text x="14" y="170">&#9675;  Compliance Playbooks</text>
      <line x1="0" y1="179" x2="400" y2="179" stroke="#1a2716" stroke-width="1"/>
      <text x="14" y="205">&#9668;  Manager Dashboard</text>
      <line x1="0" y1="214" x2="400" y2="214" stroke="#1a2716" stroke-width="1"/>
      <text x="14" y="240">&#9672;  HUD Intelligence AI</text>
      <line x1="0" y1="249" x2="400" y2="249" stroke="#1a2716" stroke-width="1"/>
    </g>

    <!-- Pricing callout -->
    <rect x="0" y="255" width="400" height="55" fill="rgba(0,229,122,0.06)" stroke-top="#00e57a"/>
    <text x="14" y="277" font-family="'Courier New', monospace" font-size="11" fill="#00e57a" letter-spacing="2">FLAT PRICING · FROM $199/MO</text>
    <text x="14" y="297" font-family="'Courier New', monospace" font-size="10" fill="#3a5a42" letter-spacing="1">No per-seat tax · Same-day deployment</text>
  </g>

  <!-- URL -->
  <text x="80" y="580" font-family="'Courier New', monospace" font-size="18" fill="#3a5a42" letter-spacing="3">www.staffinghud.com</text>

  <!-- Live indicator -->
  <circle cx="1100" cy="56" r="5" fill="#00e57a" opacity="0.9"/>
  <text x="1112" y="61" font-family="'Courier New', monospace" font-size="11" fill="#00e57a" letter-spacing="2">LIVE</text>
</svg>
